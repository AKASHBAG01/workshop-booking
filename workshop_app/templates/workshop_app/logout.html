{% extends 'workshop_app/base.html' %}

{% block title %}
    Logged out
{% endblock %}

{% block content %}

<style>

/* Center layout */
.logout-container {
    height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card design */
.logout-card {
    background: #ffffff;
    padding: 40px;
    border-radius: 16px;
    text-align: center;
    width: 420px;
    box-shadow: 0 20px 45px rgba(0,0,0,0.1);
    animation: fadeUp 0.6s ease;
}

/* Icon */
.logout-icon {
    width: 70px;
    height: 70px;
    margin: 0 auto 20px;
    border-radius: 50%;
    background: #fee2e2;
    color: #dc2626;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
}

/* Button */
.logout-btn {
    margin-top: 20px;
    border-radius: 10px;
    padding: 10px;
    font-weight: 500;
}

/* Animation */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(25px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>

<div class="logout-container">

    <div class="logout-card">

        <!-- ICON -->
        <div class="logout-icon">
            🔒
        </div>

        <!-- TEXT -->
        <h4 class="mb-2">Logged Out Successfully</h4>
        <p class="text-muted">
            You have safely logged out of your account.
        </p>

        <!-- BUTTON -->
        <a href="/" class="btn btn-primary logout-btn w-100">
            Login Again
        </a>

    </div>

</div>

{% endblock %}
